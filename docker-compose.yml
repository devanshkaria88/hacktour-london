services:
  postgres:
    image: postgres:15-alpine
    container_name: olando_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: olando
      POSTGRES_PASSWORD: olando
      POSTGRES_DB: olando
    ports:
      - "5432:5432"
    volumes:
      - olando_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U olando -d olando"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  olando_postgres_data:
    name: olando_postgres_data
